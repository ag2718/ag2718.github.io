<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

        <title>Aarush Gupta</title>

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=B612+Mono">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
        <link rel="stylesheet" href="styles.css">

        <link rel="shortcut icon" href="media/favicon.ico" type="image/x-icon" />
        <link rel="shortcut apple-touch-icon" href="media/favicon.ico" type="image/x-icon" />

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
        <script defer src="https://unpkg.com/alpinejs@3.2.4/dist/cdn.min.js"></script>
        <script type="text/javascript" src="script.js"></script>

        <script>


        </script>
    </head>

    <body>

        <section class="d-flex flex-column justify-content-end" data-aos="fade" data-aos-duration="400" id="hero">
        </section>

        <div class="main">
            <div id="name-div">
                <h1 id="name">Aarush Gupta</h1>
            </div>
            <div>
                <h2 data-aos="fade-up" data-aos-duration="400" id="mhs">Student at Montgomery HS (Class of '22)</h2>
            </div>
        </div>

        <hr class="m-5">

        <div class="center" data-aos="fade-up" data-aos-duration="500" data-aos-delay="200">
            <h2>Resume</h2>
        </div>

        <div class="mt-5 mb-5" style="width: 75vw; height: 75vh; margin: auto;">
            <embed src="media/Resume.pdf" width="100%" height="100%" />
        </div>

        <div class="center" data-aos="fade-up" data-aos-duration="400" data-aos-delay="100">
            <h2>Featured Projects</h2>
        </div>

        <div class="mb-5 mt-4 center">
            <h3 data-aos="fade-up" data-aos-duration="450" data-aos-delay="100">
                Featured below are some of the favorite projects I have worked on!
            </h3>
        </div>

        <div x-data="projects">
            <template x-for="proj in projects">
                <div x-bind:data-aos="proj.fadeDir" data-aos-duration="600" class="row project">
                    <div class="col-xl-1"></div>
                    <div class="col-xl-6">
                        <video controls="controls" x-bind:name="proj.name" x-bind:src="proj.filepath"></video>
                    </div>
                    <div class="col-xl-1"></div>
                    <div class="col-xl-3">
                        <h2 class="mt-5 mb-5" x-text="proj.name"></h2>
                        <p x-text="proj.desc"></p>
                    </div>
                    <div class="col-xl-1"></div>
                </div>
            </template>
        </div>

        <div class="m-5 center">
            <h3 data-aos="fade-up" data-aos-duration="400" >I wrote this website in HTML and CSS. Check out the full website source code out <a href="https://github.com/ag2718/ag2718.github.io">here</a>!</h3>
        </div>

    </body>

</html>
