<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

        <title>Aarush Gupta</title>

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=B612+Mono">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
        <link rel="stylesheet" href="styles.css">

        <link rel="shortcut icon" href="media/favicon.ico" type="image/x-icon" />
        <link rel="shortcut apple-touch-icon" href="media/favicon.ico" type="image/x-icon" />

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
        <script defer src="https://unpkg.com/alpinejs@3.2.4/dist/cdn.min.js"></script>
        <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
        <script type="text/javascript" src="script.js"></script>

        <script>


        </script>
    </head>

    <body>

        <section data-aos="fade-in" data-aos-duration="1000" class="d-flex flex-column justify-content-end" id="hero">
        </section>

        <div class="main">
            <div id="name-div">
                <h1 id="name">Aarush Gupta</h1>
            </div>
            <div>
                <h2 data-aos="fade-up" data-aos-duration="400" id="mhs">Student at Montgomery HS</h2>
            </div>
        </div>

        <hr class="m-5">

        <hr class="m-3" style="background-color: transparent">

        <div class="center m-5" data-aos="fade-up" data-aos-duration="400" data-aos-delay="100">
            <h2>Featured Projects</h2>
        </div>

        <div x-data="projects">
            <template x-for="proj in projects">
                <div x-bind:data-aos="proj.fadeDir" data-aos-duration="400" data-aos-delay="50" class="row project">
                    <div class="col-xl-1"></div>
                    <div class="col-xl-6">
                        <template x-if="proj.isLink">
                            <a x-bind:href="proj.url"><img x-bind:src="proj.thumbnail" width="100%"></a>
                        </template>
                        <template x-if="!proj.isLink">
                            <video controls="controls" x-bind:name="proj.name" x-bind:src="proj.filepath"></video>
                        </template>
                    </div>
                    <div class="col-xl-1"></div>
                    <div class="col-xl-3">
                        <h2 class="mt-5 mb-5" x-text="proj.name"></h2>
                        <div class="desc-div">
                            <p x-text="proj.desc"></p>
                        </div>
                    </div>
                    <div class="col-xl-1"></div>
                </div>
            </template>
        </div>

        <div class="m-5 center">
            <h3 data-aos="fade-up" data-aos-duration="400" ><a href="https://github.com/ag2718/ag2718.github.io">Here</a> is the website's full source code! My <a href="https://github.com/ag2718">GitHub page</a> contains many more of my projects (and all code). </h3>
        </div>

    </body>

</html>
